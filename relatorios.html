    /* --- Fontes locais --- */
    @font-face {
      font-family: 'Nunito';
      src: url('assets/fontes/Nunito-VariableFont_wght.ttf') format('truetype');
      font-weight:100 900;
    }
    @font-face {
      font-family: 'Nunito-Italic';
      src: url('assets/fontes/Nunito-italic-VariableFont_wght.ttf') format('truetype');
      font-style:italic;
      font-weight:100 900;
    }

    /* --- Variáveis (CORRIGIDAS: usando ganho/gasto) --- */
    :root {
      --cor-fundo-claro: #F4F7F9;
      --cor-fundo-escuro: #203A43;
      --cor-card-claro: #fff;
      --cor-card-escuro: #2C3E50;
      --cor-texto-claro: #333;
      --cor-texto-escuro: #fff;
      --cor-header-claro: #f4f7f9;
      --cor-header-escuro: #203a43;
      --cor-destaque-claro: #1abc9c;
      --cor-destaque-escuro: #1abc9c;
      --cor-ganho: #28a745; /* CORRIGIDO */
      --cor-gasto: #dc3545; /* CORRIGIDO */
      --sombra: 0 4px 6px rgba(0,0,0,0.1);
    }

    /* --- Estilos Gerais e Transições (Mantidos) --- */
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
    body { font-family:'Nunito', sans-serif; background:var(--cor-fundo-claro); color:var(--cor-texto-claro); display:flex; flex-direction:column; min-height:100vh; font-size:16px; transition: background 0.4s, color 0.4s; }
    body.dark { background:var(--cor-fundo-escuro); color:var(--cor-texto-escuro); }
    
    .page-transition { animation: fadein 0.5s ease-in-out; }
    .page-exit { animation: fadeout 0.5s ease-in-out forwards; }
    @keyframes fadein { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    @keyframes fadeout { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(0.95); } }

    header { background:var(--cor-header-claro); color:var(--cor-texto-claro); padding:15px; text-align:center; font-size:20px; font-weight:bold; box-shadow:0 2px 5px rgba(0,0,0,0.1); transition: background 0.4s, color 0.4s; }
    body.dark header { background:var(--cor-header-escuro); color:var(--cor-texto-escuro); }
    
    main { flex:1; padding:20px; padding-bottom:100px; }
    .bloco-secao { margin-bottom: 25px; }
    .bloco-secao h2 { font-size: 18px; font-weight: bold; margin-bottom: 15px; }

    /* --- Resumo e Cards --- */
    .card-resumo-grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; text-align:center; }
    .card-resumo { background:var(--cor-card-claro); padding:15px; border-radius:12px; box-shadow:var(--sombra); transition: background 0.4s, color 0.4s; }
    body.dark .card-resumo { background:var(--cor-card-escuro); color:var(--cor-texto-escuro); }
    .card-resumo h3 { font-size:14px; margin-bottom:8px; color:#666; }
    body.dark .card-resumo h3 { color:#bbb; }
    .card-resumo p { font-size:16px; font-weight:bold; }
    
    /* --- Gráficos --- */
    .grafico-card { background:var(--cor-card-claro); padding:15px; border-radius:12px; box-shadow:var(--sombra); transition: background 0.4s, color 0.4s; }
    body.dark .grafico-card { background:var(--cor-card-escuro); }

    /* --- Filtros --- */
    .filtros-periodo { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 10px; margin-bottom: 15px; }
    .filtros-periodo button, .filtro-personalizado input { flex-grow: 1; padding: 10px 15px; border: 1px solid #ccc; background: #fff; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 14px; text-align: center; }
    .filtros-periodo button.active { background: #1abc9c; color: #fff; border-color: #1abc9c; font-weight: bold; }
    body.dark .filtros-periodo button { background: #34495e; color: #fff; border-color: #555; }
    body.dark .filtros-periodo button.active { background: #1abc9c; border-color: #1abc9c; }
    .filtro-personalizado { display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
    .filtro-personalizado label { font-size: 14px; font-weight: bold; color: #666; }
    body.dark .filtro-personalizado label { color: #bbb; }
    body.dark .filtro-personalizado input { background: #34495e; color: #fff; border-color: #555; }

    /* --- Lista de Categorias (Detalhes) --- */
    .lista-categorias { background:var(--cor-card-claro); padding:15px; border-radius:12px; box-shadow:var(--sombra); transition: background 0.4s, color 0.4s; }
    body.dark .lista-categorias { background:var(--cor-card-escuro); color:var(--cor-texto-escuro); }
    .lista-categorias h3 { font-size: 16px; font-weight: bold; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid #eee; }
    body.dark .lista-categorias h3 { border-bottom: 1px solid #555; }
    .categoria-item { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; font-size: 16px; padding: 10px; border-radius: 8px; transition: background 0.3s; }
    .categoria-item-info { display: flex; align-items: center; width: 60%; }
    .categoria-item-info i { margin-right: 10px; color: #888; }
    body.dark .categoria-item-info i { color: #aaa; }
    .progress-bar-container { width: 30%; height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; }
    body.dark .progress-bar-container { background: #555; }
    /* Classes de barra de progresso CORRIGIDAS */
    .progress-bar { height: 100%; transition: width 0.5s ease-in-out; }
    .progress-bar.gasto { background-color: var(--cor-gasto); } 
    .progress-bar.ganho { background-color: var(--cor-ganho); } 
    .categoria-item-valor { font-weight: bold; width: 10%; text-align: right; }
    

/* --- Estilos do Rodapé (Replicado do Home) --- */
.footer { 
    position: fixed; 
    bottom: 0; 
    left: 0; 
    width: 100%; 
    background: var(--cor-header-escuro); 
    display: flex; 
    justify-content: space-around; 
    padding: 10px 0; 
    color: #fff; 
    font-family: 'Nunito', sans-serif; 
    border-top: 1px solid rgba(255,255,255,0.1); 
    z-index: 999;
}

.footer .nav-item { 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  font-size: 13px; 
  color: #bbb; 
  flex: 1; 
  transition: 0.3s; 
  cursor: pointer; 
}

.footer .nav-item i {

  margin-bottom: 4px; 
}

.footer .nav-item.active {

}

.footer .nav-item.active i {

}

.footer .nav-item:hover { 
  color: var(--cor-destaque-claro);

/* --- CSS para colorir os Ícones de Categoria --- */

/* Definição básica para o contêiner (para alinhar) */

/* Aplica a cor Vermelha (Gasto) ao ícone */

    color: var(--cor-gasto) !important; /* Força a cor vermelha */
    margin-right: 8px;

/* Aplica a cor Verde (Ganho) ao ícone */
.lista-categorias .icone-ganho {
    color: var(--cor-ganho) !important; /* Força a cor verde */
    margin-right: 8px; 
    min-width: 18px; 
    text-align: center;
}

</main>

  function aplicarIdioma(){
    idioma = localStorage.getItem('idioma') || 'pt';

      if(textos[idioma] && textos[idioma][key]) el.textContent = textos[idioma][key];
    });
    updateUI();
  }
  
  function formatarMoeda(valor) {
    const numValor = Number(valor) || 0;
    return `${moeda} ${numValor.toLocaleString(locale, { minimumFractionDigits: 2 })}`;
  }


  function capitalizeWords(s){
    // Trata chaves compostas por underline (_)
    return s.split('_').map(w => w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
  }

  // --- getTransactionsForPeriod (Lógica de Filtro por Data) ---
  function getTransactionsForPeriod() {
    let transacoesFiltradas = [];
    const hoje = new Date();
    hoje.setHours(0,0,0,0);
    
    let inicio, fim;
    
    // Remove a classe 'active' de todos os botões e adiciona ao ativo
    document.querySelectorAll('.filtros-periodo button').forEach(btn => btn.classList.remove('active'));
    const btnAtivo = document.querySelector(`[data-periodo="${periodoAtual}"]`);
    if(btnAtivo) btnAtivo.classList.add('active');


    if (periodoAtual === 'mes-atual') {
      inicio = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
      fim = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 0);
    } else if (periodoAtual === 'ultimos-30-dias') {
      // Começa 29 dias atrás para incluir o dia atual
      inicio = new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate() - 29); 
      fim = hoje;
    } else if (periodoAtual === 'ano-atual') {
      inicio = new Date(hoje.getFullYear(), 0, 1);
      fim = new Date(hoje.getFullYear(), 11, 31);
    } else if (periodoAtual === 'personalizado') {
      inicio = dataInicioPersonalizada;
      fim = dataFimPersonalizada;
    } else {
      inicio = null; // Filtro 'total'
      fim = null;
    }

    if (inicio && fim) {

// ... (continua da parte de getTransactionsForPeriod)

    // Normaliza as datas para a filtragem
    inicio.setHours(0,0,0,0);
    fim.setHours(23,59,59,999);
    
    transacoesFiltradas = transacoesCompletas.filter(t => {
      // Cria a data da transação com fuso horário local para garantir a comparação correta
      const dataTransacao = new Date(t.data + 'T00:00:00'); 
      return dataTransacao >= inicio && dataTransacao <= fim;
    });
  } else {
    transacoesFiltradas = transacoesCompletas;
  }
  return transacoesFiltradas;
}

/** Calcula o resumo financeiro (ganhos, gastos, saldo e categorização). */
function buildStats(transacoes) {
  const ganhos = transacoes.filter(t => t.tipo==="ganho").reduce((a,t)=>a+(Number(t.valor)||0),0);
  const gastos = transacoes.filter(t => t.tipo==="gasto").reduce((a,t)=>a+(Number(t.valor)||0),0);
  const saldo = ganhos - gastos;
  
  const categoriasGastos = {};
  transacoes.forEach(t=>{
    if(t.tipo === "gasto"){
      // Garante que a chave seja sempre minúscula e trimada, com fallback
      const key = (t.categoria || "outros_gastos").toString().trim().toLowerCase();
      categoriasGastos[key] = (categoriasGastos[key] || 0) + (Number(t.valor)||0);
    }
  });

  const categoriasGanhos = {};
  transacoes.forEach(t=>{
    if(t.tipo === "ganho"){
      const key = (t.categoria || "outros_ganhos").toString().trim().toLowerCase();
      categoriasGanhos[key] = (categoriasGanhos[key] || 0) + (Number(t.valor)||0);
    }
  });

  return { ganhos, gastos, saldo, categoriasGastos, categoriasGanhos };
}

// --- RENDERIZAÇÃO DE GRÁFICOS (CHART.JS)

// Função auxiliar para obter o valor real de uma variável CSS
function getCssVariable(name) {
  // Cria um elemento temporário para garantir que o estilo seja computado
  const tempDiv = document.createElement('div');
  tempDiv.style.color = `var(${name})`;
  document.body.appendChild(tempDiv);
  const color = window.getComputedStyle(tempDiv).color;
  document.body.removeChild(tempDiv);
  
  // No Chrome, o valor pode vir como RGB (ex: rgb(46, 204, 113))
  // Se o valor for 'transparent', a variável não foi definida ou falhou. 
  // O valor retornado será o valor computado real.
  return color;
}


/** Cria ou atualiza os gráficos de Pizza (Gastos) e Barra (Ganhos vs Gastos). */
function renderCharts(stats) {
  const ctxPizza = document.getElementById("grafico-pizza").getContext("2d");
  const ctxBarra = document.getElementById("grafico-barra").getContext("2d");

  if (chartPizza) { chartPizza.destroy(); }
  if (chartBarra) { chartBarra.destroy(); }
  
  const isDarkMode = document.body.classList.contains('dark');
  const textColor = isDarkMode ? getCssVariable('--cor-texto-escuro') || '#ECF0F1' : getCssVariable('--cor-texto-claro') || '#2C3E50';
  const cardColor = isDarkMode ? '#2C3E50' : '#fff';

  // Obter cores reais do CSS
  const corGanho = getCssVariable('--cor-ganho') || '#2ECC71'; // Verde padrão de fallback
  const corGasto = getCssVariable('--cor-gasto') || '#E74C3C'; // Vermelho padrão de fallback


  // GRÁFICO DE PIZZA (Gastos por Categoria)
  // [ ... código do gráfico de pizza permanece o mesmo ... ]
  const catKeysGastos = Object.keys(stats.categoriasGastos); 
  const labelsGastos = catKeysGastos.map(k => (categoriasTextos[idioma] && categoriasTextos[idioma][k]) ? categoriasTextos[idioma][k] : capitalizeWords(k));
  const dataValsGastos = catKeysGastos.map(k => stats.categoriasGastos[k]);

  if (dataValsGastos.length === 0 || stats.gastos === 0) {
    chartPizza = new Chart(ctxPizza, {
      type: 'doughnut',
      data: { labels: [textos[idioma].semDados], datasets: [{ data: [1], backgroundColor: ['#e0e0e0'] }] },
      options: { responsive:true, plugins:{legend:{position:'bottom'}} }
    });
  } else {
    chartPizza = new Chart(ctxPizza, {
      type: 'doughnut',
      data: {
        labels: labelsGastos,
        datasets: [{
          data: dataValsGastos,
          backgroundColor: colorsPalette.slice(0, dataValsGastos.length),
          borderColor: cardColor,
          borderWidth: 2
        }]
      },
      options: { 
          responsive:true, 
          plugins:{
              legend:{
                  position:'bottom',
                  labels: { color: textColor }
              }
          }
      }
    });
  }

  // GRÁFICO DE BARRAS (Ganhos vs Gastos)
  chartBarra = new Chart(ctxBarra, {
    type: 'bar',
    data: {
      labels: [textos[idioma].ganhos, textos[idioma].gastos], 
      datasets: [{
        label: moeda,
        data: [stats.ganhos, stats.gastos], 
        // AGORA USAMOS AS CORES OBTIDAS VIA getComputedStyle
        backgroundColor: [corGanho, corGasto],
        borderRadius: 5
      }]
    },
    options: { 
      responsive:true, 
      plugins:{legend:{display:false}},
      scales: {
          y: {
              beginAtZero: true,
              ticks: {
                  color: textColor,
                  callback: function(value) { return formatarMoeda(value); }
              }
          },
          x: {
              ticks: { color: textColor }
          }
      }
    }
  });
}

/** Carrega todos os dados de transações do Local Storage. */
function loadAllData() {
  try {
    const dados = JSON.parse(localStorage.getItem("financeflow"));
    transacoesCompletas = dados && Array.isArray(dados.transacoes) ? dados.transacoes : [];
  } catch (e) {
    transacoesCompletas = [];
  }
  updateUI();
}

// Event Listeners dos Filtros de Período
document.querySelectorAll('.filtros-periodo button').forEach(button => {
  button.addEventListener('click', (e) => {
    periodoAtual = e.target.dataset.periodo;
    
    // Limpa as datas personalizadas
    document.getElementById('data-inicio').value = '';
    document.getElementById('data-fim').value = '';
    dataInicioPersonalizada = null;
    dataFimPersonalizada = null;
    
    updateUI();

});

// Event Listener para as Datas Personalizadas
const handleDateChange = (event) => {
  const dataInicioStr = document.getElementById('data-inicio').value;
  const dataFimStr = document.getElementById('data-fim').value;

  if (!dataInicioStr || !dataFimStr) return;

  const inicio = new Date(dataInicioStr + 'T00:00:00');
  const fim = new Date(dataFimStr + 'T00:00:00');

  if (inicio > fim) {
      alert(textos[idioma].erroDataFim || "A data de fim não pode ser anterior à data de início.");
      if (event.target.id === 'data-fim') {
           document.getElementById('data-fim').value = '';
      } else {
           document.getElementById('data-inicio').value = '';
      }
      return; 
  }
  
  dataInicioPersonalizada = inicio;
  dataFimPersonalizada = fim;

  if (dataInicioPersonalizada && dataFimPersonalizada) {
    periodoAtual = 'personalizado';
    document.querySelectorAll('.filtros-periodo button').forEach(btn => btn.classList.remove('active'));
    updateUI();
  }
};

document.getElementById('data-inicio').addEventListener('change', handleDateChange);
document.getElementById('data-fim').addEventListener('change', handleDateChange);


// --- Rotina de Inicialização ---
document.addEventListener('DOMContentLoaded', () => {
  const tema = localStorage.getItem("tema") || "light";
  if (tema === "dark") document.body.classList.add("dark");
  
  aplicarIdioma(); 
  loadAllData();
  
  // Define o filtro padrão como ativo (Mês Atual)
  const filtroPadrao = document.querySelector('[data-periodo="mes-atual"]');
  if(filtroPadrao) filtroPadrao.classList.add('active');
  
  document.body.classList.add('page-transition');
});

// --- Sincronização com Storage (se houver mudanças em outras telas) ---
window.addEventListener('storage', (e) => {
  if (e.key === 'idioma' || e.key === 'moeda' || e.key === 'financeflow' || e.key === 'tema') {
    loadAllData();
    aplicarIdioma();
  }
});

<script>
// ===========================
// FEEDBACK GLOBAL SUAVE E REALISTA
// ===========================
let audioCtx;
if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function tocarSom(frequencia = 400, duracao = 0.15, volume = 0.15) {
  if (localStorage.getItem('som') !== 'true') return;

  const osc = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();

  // --- Som digital mais suave e limpo ---
  osc.type = 'triangle'; // som mais moderno e agradável
  osc.frequency.setValueAtTime(frequencia, audioCtx.currentTime);

  gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duracao); // fade-out suave

  osc.connect(gainNode);
  gainNode.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + duracao);
}

function vibrar(duracao = 30) {
  if (localStorage.getItem('vibracao') === 'true' && navigator.vibrate) {
    navigator.vibrate(duracao);
  }
}

function aplicarFeedbackRealista(el) {
  if (el.dataset.feedbackInit) return;
  el.dataset.feedbackInit = 'true';

  const tag = el.tagName.toLowerCase();
  const type = el.type ? el.type.toLowerCase() : '';

  // Configurações padrão
  let freqDown = 400, durDown = 0.1, vibDown = 30;
  let freqUp = 430, durUp = 0.1, vibUp = 20;

  // Ajustes por tipo de elemento
  if (type === 'checkbox' || type === 'radio') {
    freqDown = 440; durDown = 0.08; vibDown = 25;
    freqUp = 480; durUp = 0.08; vibUp = 15;
  } else if (tag === 'button' || el.classList.contains('btn')) {
    freqDown = 380; durDown = 0.12; vibDown = 40;
    freqUp = 420; durUp = 0.1; vibUp = 25;
  } else if (type === 'range') {
    freqDown = 300; durDown = 0.05; vibDown = 10;
    freqUp = 330; durUp = 0.05; vibUp = 5;
  } else if (tag === 'select') {
    freqDown = 360; durDown = 0.08; vibDown = 20;
    freqUp = 390; durUp = 0.08; vibUp = 15;
  } else if (tag === 'a') {
    freqDown = 400; durDown = 0.1; vibDown = 30;
    freqUp = 440; durUp = 0.1; vibUp = 20;
  }

  // Som e vibração ao pressionar
  el.addEventListener('mousedown', () => { tocarSom(freqDown, durDown); vibrar(vibDown); });
  el.addEventListener('touchstart', () => { tocarSom(freqDown, durDown); vibrar(vibDown); }, { passive: true });

  // Som e vibração ao soltar
  el.addEventListener('mouseup', () => { tocarSom(freqUp, durUp); vibrar(vibUp); });
  el.addEventListener('touchend', () => { tocarSom(freqUp, durUp); vibrar(vibUp); });

  // Checkbox e radio: som específico ao alterar valor
  if (type === 'checkbox' || type === 'radio') {
    el.addEventListener('change', () => {
      const ativo = el.checked;
      tocarSom(ativo ? 500 : 370, 0.15, 0.18);
      vibrar(ativo ? 30 : 20);
    });
  }

  // Slider range: feedback contínuo proporcional
  if (type === 'range') {
    let lastValue = el.value;
    el.addEventListener('input', () => {
      const delta = Math.abs(el.value - lastValue);
      if (delta > 0) {
        const freq = 320 + delta * 5;
        const vib = Math.min(40, delta * 4);
        tocarSom(freq, 0.04, 0.12);
        vibrar(vib);
        lastValue = el.value;
      }
    });
  }

  // Select: feedback ao abrir/fechar
  if (tag === 'select') {
    el.addEventListener('mousedown', () => { tocarSom(350, 0.1, 0.15); vibrar(15); });
    el.addEventListener('change', () => { tocarSom(420, 0.1, 0.15); vibrar(20); });
  }
}

function initFeedbackGlobalRealista() {
  const selectors = 'button, input[type="checkbox"], input[type="radio"], input[type="range"], select, [role="button"], .btn, .switch input, a';
  
  // Aplica feedback nos elementos já existentes
  document.querySelectorAll(selectors).forEach(aplicarFeedbackRealista);

  // Observa DOM para elementos adicionados dinamicamente
  const observer = new MutationObserver(() => {
    document.querySelectorAll(selectors).forEach(aplicarFeedbackRealista);
  });
  observer.observe(document.body, { childList: true, subtree: true });
}

document.addEventListener('DOMContentLoaded', initFeedbackGlobalRealista);
</script>
