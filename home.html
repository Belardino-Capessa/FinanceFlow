<style>
    @font-face {
      font-family: 'Nunito';
      src: url('assets/fontes/Nunito-VariableFont_wght.ttf') format('truetype');
      font-weight: 100 900;
    }
    @font-face {
      font-family: 'Nunito-Italic';
      src: url('assets/fontes/Nunito-italic-VariableFont_wght.ttf') format('truetype');
      font-style: italic;
      font-weight: 100 900;
    }

    /* ---------------------------------------------------- */
    /* Variáveis - ATUALIZADAS para Ganhos/Gastos e Cores */
    /* ---------------------------------------------------- */
    :root {
      --cor-fundo-claro: #F4F7F9;
      --cor-fundo-escuro: #203A43;
      --cor-card-claro: #fff;
      --cor-card-escuro: #2C3E50;
      --cor-texto-claro: #333;
      --cor-texto-escuro: #fff;
      --cor-header-claro: #f4f7f9;
      --cor-header-escuro: #203a43;
      --cor-destaque: #1abc9c; /* Cor principal (para Saldo/Botões) */
      --cor-secundaria-claro: #f0f0f0;
      --cor-secundaria-escuro: #34495e;
      --cor-ganho: #28a745; /* VERDE: Para ganhos/receitas */
      --cor-gasto: #dc3545; /* VERMELHO: Para gastos/despesas */
      --cor-aviso: #ffc107; /* Amarelo/Aviso */
      --sombra: 0 4px 10px rgba(0,0,0,0.1);
      --sombra-card-total: 0 6px 15px rgba(26, 188, 156, 0.4);
    }

    /* ---------------------------------------------------- */
    /* Base e Transições */
    /* ---------------------------------------------------- */
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
      /* Melhorando a experiência móvel */
      -webkit-tap-highlight-color: transparent; 
    }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--cor-fundo-claro);
      color: var(--cor-texto-claro);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-size: 16px; 
      transition: background 0.4s, color 0.4s;
    }
    body.dark {
      background: var(--cor-fundo-escuro);
      color: var(--cor-texto-escuro);
    }
    
    header {
      background: var(--cor-header-claro);
      color: var(--cor-texto-claro);
      padding: 18px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      transition: background 0.4s, color 0.4s;
    }
    body.dark header {
      background: var(--cor-header-escuro);
      color: var(--cor-texto-escuro);
    }

    main { 
      flex: 1; 
      padding: 22px; 
      padding-bottom: 90px; 
    }

    .page-transition { animation: fadein 0.5s ease-in-out; }
    .page-exit { animation: fadeout 0.5s ease-in-out forwards; }

    @keyframes fadein {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes fadeout {
      from { opacity: 1; transform: scale(1); }
      to { opacity: 0; transform: scale(0.95); }
    }

    /* ---------------------------------------------------- */
    /* Cartões e Resumo (Home Específico) */
    /* ---------------------------------------------------- */
    .resumo {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 20px;
    }
    
    .card {
      background: var(--cor-card-claro);
      color: var(--cor-texto-claro);
      border-radius: 12px;
      padding: 24px;
      box-shadow: var(--sombra);
      transition: background 0.4s, color 0.4s;
    }
    body.dark .card {
      background: var(--cor-card-escuro);
      color: var(--cor-texto-escuro);
    }

    /* Saldo Total - Visual Acentuado e Ícones */
    .card.saldo-total {
      background: var(--cor-destaque);
      color: #fff;
      box-shadow: var(--sombra-card-total);
      position: relative;
    }
    .card.saldo-total h2 { 
        font-size: 1.1em; 
        margin-bottom: 12px; 
        display: flex;
        align-items: center;
    }
    .card.saldo-total h2 i {
        font-size: 1.2em;
        margin-right: 10px;
    }
    .card.saldo-total .valor-total { 
        font-size: 2.5em;
        font-weight: 800; 
    }
    
    /* Mini Cards (Ganhos/Gastos) */
    .card-resumo-mes {
      display: flex;
      justify-content: space-between;
      gap: 15px;
    }

    .card-resumo-mes .mini-card {
      flex: 1;
      text-align: center;
      padding: 15px;
      border-radius: 10px;
      background: var(--cor-secundaria-claro);
      transition: background 0.4s;
      border: 1px solid rgba(0,0,0,0.05); 
    }
    body.dark .mini-card { 
        background: var(--cor-secundaria-escuro); 
        border: 1px solid rgba(255,255,255,0.05);
    }

    .mini-card h3 { 
        font-size: 0.9em; 
        margin-bottom: 5px; 
        color: #666;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    body.dark .mini-card h3 { color: #bbb; }
    
    .mini-card h3 i { margin-right: 5px; }

    .mini-card p { font-size: 1.2em; font-weight: bold; }
    /* Cores das Variáveis aplicadas ao texto */
    .ganho { color: var(--cor-ganho); font-weight: bold; } 
    .gasto { color: var(--cor-gasto); font-weight: bold; }
    
    /* Gráfico */
    .grafico-resumo {
      background: var(--cor-card-claro);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: var(--sombra);
      transition: background 0.4s, color 0.4s;
      /* CORREÇÃO: Define uma altura fixa para evitar o crescimento descontrolado */
      height: 300px; 
    }
    body.dark .grafico-resumo { background: var(--cor-card-escuro); color: var(--cor-texto-escuro); }
    .grafico-resumo h3 {
        font-size: 1.1em;
        margin-bottom: 15px;
    }
    
    /* Últimas Transações */
    .transacoes {
        background: var(--cor-card-claro);
        border-radius: 12px;
        padding: 18px;
        box-shadow: var(--sombra);
        transition: background 0.4s, color 0.4s;
    }
    body.dark .transacoes { background: var(--cor-card-escuro); color: var(--cor-texto-escuro); }
    .transacoes h3 {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .transacoes h3 a {
        font-size: 0.8em;
        font-weight: normal;
        color: var(--cor-destaque);
        text-decoration: none;
    }
    .transacoes ul { list-style: none; padding: 0; }
    .transacoes li { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        padding: 12px 0; 
        border-bottom: 1px solid #eee; 
        font-size: 0.95em; 
        gap: 10px;
        transition: background 0.2s; 
    }
    body.dark .transacoes li { border-bottom: 1px solid #555; }
    .transacoes li:last-child { border-bottom: none; }
    .transacoes li:hover { background: var(--cor-secundaria-claro); padding-left: 5px; border-radius: 4px; }
    body.dark .transacoes li:hover { background: var(--cor-secundaria-escuro); }

    .transacoes .info { flex: 1; }
    .transacoes .info span:first-child { 
        font-weight: 600; 
        display: block;
        margin-bottom: 2px;
    }
    .transacoes .info .categoria { font-size: 0.8em; color: #666; }
    body.dark .transacoes .info .categoria { color:#bbb; }

    /* ---------------------------------------------------- */
    /* Footer, Botões e Empty State */
    /* ---------------------------------------------------- */
    .footer { 
        position: fixed; 
        bottom: 0; 
        left: 0; 
        width: 100%; 
        background: var(--cor-header-escuro); 
        display: flex; 
        justify-content: space-around; 
        padding: 10px 0; 
        color: #fff; 
        font-family: 'Nunito', sans-serif; 
        border-top: 1px solid rgba(255,255,255,0.1); 
        z-index: 999;
    }
    .footer .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 11px; color: #bbb; flex: 1; transition: 0.3s; cursor: pointer; }
    .footer .nav-item i { font-size: 20px; margin-bottom: 4px; }
    .footer .nav-item.active { color: var(--cor-destaque); }
    .footer .nav-item.active i { color: var(--cor-destaque); }
    .footer .nav-item:hover { color: var(--cor-destaque); }
    
    .assinatura { text-align: center; font-size: 11px; margin: 5px 0; color: #666; }
    body.dark .assinatura { color: #aaa; }
    
    .add-btn {
      position: fixed;
      bottom: 75px;
      right: 20px;
      width: 55px;
      height: 55px;
      background: var(--cor-destaque);
      color: #fff;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      transition: background 0.3s ease-in-out, transform 0.3s ease-in-out;
      z-index: 1000;
    }
    .add-btn:hover {
      background: #16a085;
      transform: scale(1.1);
    }
    
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #666;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      background: var(--cor-card-claro);
      border-radius: 12px;
      box-shadow: var(--sombra);
    }
    body.dark .empty-state { color: #bbb; background: var(--cor-card-escuro); }
    .empty-state h4 { font-size: 1.1em; margin-bottom: 5px; }
    .empty-state p { font-size: 1em; }
    .empty-state .fas { font-size: 3em; color: #ccc; }
    body.dark .empty-state .fas { color: #444; }
    .empty-state .add-first-btn {
      background: var(--cor-destaque);
      color: #fff;
      padding: 12px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: background 0.3s;
    }
    .empty-state .add-first-btn:hover { background: #16a085; }

    /* TOAST - Feedback Moderno */
    .toast {
        visibility: hidden;
        min-width: 250px;
        background-color: var(--cor-destaque);
        color: #fff;
        text-align: center;
        border-radius: 8px;
        padding: 16px;
        position: fixed;
        z-index: 2000;
        left: 50%;
        bottom: 100px;
        transform: translateX(-50%);
        font-size: 1em;
        box-shadow: var(--sombra);
        opacity: 0;
        transition: opacity 0.5s, visibility 0.5s, bottom 0.5s;
    }
    .toast.show {
        visibility: visible;
        opacity: 1;
        bottom: 80px;
    }
    
    /* Otimização de Responsividade */
    @media (min-width: 600px) {
        main {
            max-width: 900px; 
            margin: 0 auto;
        }
        .card-resumo-mes {
            flex-direction: row;
        }
        /* Ajuste de altura em telas maiores */
        .grafico-resumo {
             height: 350px; 
        }
    }
  </style>

    function formatarMoeda(valor) {
      const moeda = localStorage.getItem("moeda") || "Kz";
      const idioma = localStorage.getItem('idioma') || 'pt';
      const locale = (idioma === 'pt') ? 'pt-PT' : 'en-US';
      const numValor = Number(valor) || 0;
      
      return `${moeda} ${numValor.toLocaleString(locale, { minimumFractionDigits: 2 })}`;

      const idioma = localStorage.getItem('idioma') || 'pt';
      
      // 1. Tradução Simples (data-i18n)
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (textos[idioma] && textos[idioma][key]) {
          if (el.tagName !== 'H2' && el.tagName !== 'H3') {
            el.textContent = textos[idioma][key];
          }
        }
      });
      
      // 2. Tradução de Elementos Complexos (com Ícones) - CORRIGIDO com verificação de null

      if (saldoTotalH2) {

      const ganhosH3 = document.querySelector('.mini-card:nth-child(1) h3');
      if (ganhosH3) {
          ganhosH3.innerHTML = `<i class="fas fa-arrow-alt-circle-up" style="color: var(--cor-ganho);"></i> ${textos[idioma].receitas_mes}`;
      }

      const gastosH3 = document.querySelector('.mini-card:nth-child(2) h3');

          gastosH3.innerHTML = `<i class="fas fa-arrow-alt-circle-down" style="color: var(--cor-gasto);"></i> ${textos[idioma].despesas_mes}`;

      if (!toast) return;

      if (tipo === 'erro') cor = 'var(--cor-gasto)';
      if (tipo === 'aviso') cor = 'var(--cor-aviso)';
      
      toast.textContent = mensagem;
      toast.style.backgroundColor = cor;
      toast.classList.add('show');
      
      setTimeout(() => {
        toast.classList.remove('show');
      }, duracao);

    function carregarDadosEcalcular() {
      const idioma = localStorage.getItem('idioma') || 'pt';
      const dados = JSON.parse(localStorage.getItem("financeflow")) || { transacoes: [], metas: [] };
      const hoje = new Date();
      const primeiroDiaMes = new Date(hoje.getFullYear(), hoje.getMonth(), 1); 

      let saldoTotal = 0;
      let ganhosMes = 0;
      let gastosMes = 0;

      dados.transacoes.forEach(t => {
        const dataTransacao = new Date(t.data + 'T00:00:00');
        
        // Padroniza a verificação: 'receita', 'entrada' ou 'ganho'
        const isGanho = (t.tipo.toLowerCase().includes("receita") || t.tipo.toLowerCase().includes("entrada") || t.tipo.toLowerCase().includes("ganho")); 

        if (isGanho) {
          saldoTotal += t.valor;
          if (dataTransacao >= primeiroDiaMes) {
            ganhosMes += t.valor;
          }
        } else {
          saldoTotal -= t.valor;
          if (dataTransacao >= primeiroDiaMes) {
            gastosMes += t.valor;
          }
        }
      });
      
      const contentHome = document.getElementById("content-home");
      const transacoesExistentes = dados.transacoes.length > 0;
      
      // Renderização Condicional (Empty State)

        if (ultimas.length === 0) {
             lista.innerHTML = `<li style="text-align:center; color:#999;">${textos[idioma].nenhuma_transacao_titulo}</li>`;
        } else {
            ultimas.forEach(t => {
              const isGanho = (t.tipo.toLowerCase().includes("receita") || t.tipo.toLowerCase().includes("entrada") || t.tipo.toLowerCase().includes("ganho")); 
              const tipoClasse = isGanho ? 'ganho' : 'gasto'; 
              const tipoSimbolo = isGanho ? "+" : "-";

              // Busca a informação da categoria (chave minúscula)
              const categoriaChave = t.categoria ? t.categoria.toLowerCase() : 'outros_gastos';
              
              const infoCategoria = categoriasInfo[categoriaChave];
              
              // Define o ícone e o nome da categoria com base no novo mapeamento
              let icone = infoCategoria ? infoCategoria.icon : (isGanho ? iconesPadrao.ganho : iconesPadrao.gasto);
              let categoriaTraduzida = infoCategoria ? infoCategoria[idioma] : t.categoria; 

              const dataFormatada = new Date(t.data + 'T00:00:00').toLocaleDateString(idioma === 'pt' ? 'pt-PT' : 'en-US', { month: 'short', day: 'numeric' });

              const li = document.createElement("li");
              // Adicionamos a classe 'icone-categoria' para um estilo limpo (se você adicionar ao seu CSS)

                <i class="${icone}" style="font-size: 1.2em; color: ${isGanho ? 'var(--cor-ganho)' : 'var(--cor-gasto)'}; width: 25px; text-align:center;"></i>
                <div class="info">
                  <span>${t.descricao}</span>
                  <span class="categoria">${categoriaTraduzida} - ${dataFormatada}</span>
                </div>
                <span class="${tipoClasse}">
                  ${tipoSimbolo} ${formatarMoeda(t.valor)}

              lista.appendChild(li);
            });
        }
      }
    }

    function renderChart(ganhos, gastos) {
      if (chartBarra) { chartBarra.destroy(); }
      
      const ctx = document.getElementById("grafico-barra-resumo");
      if (!ctx) return; 
      
      const idioma = localStorage.getItem('idioma') || 'pt';
      
      chartBarra = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: [textos[idioma].receitas_mes, textos[idioma].despesas_mes], 
          datasets: [{
            label: localStorage.getItem("moeda") || "Kz",

        options: {

          plugins: {

              ticks: {

                  return formatarMoeda(value);

              }
            }
          }
        }
      });
    }

      if (e.key === 'idioma' || e.key === 'moeda' || e.key === 'financeflow' || e.key === 'tema') {

      }
    });

  <script>
// ===========================
// FEEDBACK GLOBAL SUAVE E REALISTA
// ===========================
let audioCtx;
if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function tocarSom(frequencia = 400, duracao = 0.15, volume = 0.15) {
  if (localStorage.getItem('som') !== 'true') return;

  const osc = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();

  // --- Som digital mais suave e limpo ---
  osc.type = 'triangle'; // som mais moderno e agradável
  osc.frequency.setValueAtTime(frequencia, audioCtx.currentTime);

  gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duracao); // fade-out suave

  osc.connect(gainNode);
  gainNode.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + duracao);
}

function vibrar(duracao = 30) {
  if (localStorage.getItem('vibracao') === 'true' && navigator.vibrate) {
    navigator.vibrate(duracao);
  }
}

function aplicarFeedbackRealista(el) {
  if (el.dataset.feedbackInit) return;
  el.dataset.feedbackInit = 'true';

  const tag = el.tagName.toLowerCase();
  const type = el.type ? el.type.toLowerCase() : '';

  // Configurações padrão
  let freqDown = 400, durDown = 0.1, vibDown = 30;
  let freqUp = 430, durUp = 0.1, vibUp = 20;

  // Ajustes por tipo de elemento
  if (type === 'checkbox' || type === 'radio') {
    freqDown = 440; durDown = 0.08; vibDown = 25;
    freqUp = 480; durUp = 0.08; vibUp = 15;
  } else if (tag === 'button' || el.classList.contains('btn')) {
    freqDown = 380; durDown = 0.12; vibDown = 40;
    freqUp = 420; durUp = 0.1; vibUp = 25;
  } else if (type === 'range') {
    freqDown = 300; durDown = 0.05; vibDown = 10;
    freqUp = 330; durUp = 0.05; vibUp = 5;
  } else if (tag === 'select') {
    freqDown = 360; durDown = 0.08; vibDown = 20;
    freqUp = 390; durUp = 0.08; vibUp = 15;
  } else if (tag === 'a') {
    freqDown = 400; durDown = 0.1; vibDown = 30;
    freqUp = 440; durUp = 0.1; vibUp = 20;
  }

  // Som e vibração ao pressionar
  el.addEventListener('mousedown', () => { tocarSom(freqDown, durDown); vibrar(vibDown); });
  el.addEventListener('touchstart', () => { tocarSom(freqDown, durDown); vibrar(vibDown); }, { passive: true });

  // Som e vibração ao soltar
  el.addEventListener('mouseup', () => { tocarSom(freqUp, durUp); vibrar(vibUp); });
  el.addEventListener('touchend', () => { tocarSom(freqUp, durUp); vibrar(vibUp); });

  // Checkbox e radio: som específico ao alterar valor
  if (type === 'checkbox' || type === 'radio') {
    el.addEventListener('change', () => {
      const ativo = el.checked;
      tocarSom(ativo ? 500 : 370, 0.15, 0.18);
      vibrar(ativo ? 30 : 20);
    });
  }

  // Slider range: feedback contínuo proporcional
  if (type === 'range') {
    let lastValue = el.value;
    el.addEventListener('input', () => {
      const delta = Math.abs(el.value - lastValue);
      if (delta > 0) {
        const freq = 320 + delta * 5;
        const vib = Math.min(40, delta * 4);
        tocarSom(freq, 0.04, 0.12);
        vibrar(vib);
        lastValue = el.value;
      }
    });
  }

  // Select: feedback ao abrir/fechar
  if (tag === 'select') {
    el.addEventListener('mousedown', () => { tocarSom(350, 0.1, 0.15); vibrar(15); });
    el.addEventListener('change', () => { tocarSom(420, 0.1, 0.15); vibrar(20); });
  }
}

function initFeedbackGlobalRealista() {
  const selectors = 'button, input[type="checkbox"], input[type="radio"], input[type="range"], select, [role="button"], .btn, .switch input, a';
  
  // Aplica feedback nos elementos já existentes
  document.querySelectorAll(selectors).forEach(aplicarFeedbackRealista);

  // Observa DOM para elementos adicionados dinamicamente
  const observer = new MutationObserver(() => {
    document.querySelectorAll(selectors).forEach(aplicarFeedbackRealista);
  });
  observer.observe(document.body, { childList: true, subtree: true });
}

document.addEventListener('DOMContentLoaded', initFeedbackGlobalRealista);
</script>
