
<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinanceFlow - Splash</title>
  <style>
    @font-face {
      font-family: 'Nunito';
      src: url('assets/fontes/Nunito-VariableFont_wght.ttf') format('truetype');
      font-weight: 100 900;
      font-style: normal;
    }
    @font-face {
      font-family: 'Nunito';
      src: url('assets/fontes/Nunito-Italic-VariableFont_wght.ttf') format('truetype');
      font-weight: 100 900;
      font-style: italic;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      height:100vh;
      background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
      font-family:'Nunito',sans-serif;
      color:#fff;
      overflow:hidden;
      position:relative;
      font-size:17px;
      transition:background 0.4s,color 0.4s;
    }
    body.dark { background:#203a43; color:#fff; }

    /* --- CONTAINER PRINCIPAL --- */
    .splash-container {
      text-align:center;
      animation:fadeIn 1.5s ease-in-out;
      z-index:2;
    }

    /* --- LOGO --- */
    .logo {
      width:140px;
      height:140px;
      margin:0 auto 20px;
      display:flex;
      align-items:center;
      justify-content:center;
      animation:pulse 2s infinite;
      filter:drop-shadow(0 0 10px rgba(0,255,204,0.3));
    }
    .logo svg { width:120px; height:120px; }

    /* --- TEXTO --- */
    .app-name {
      font-size:2.4rem;
      font-weight:700;
      letter-spacing:1px;
      margin-bottom:12px;
      text-shadow:0 2px 5px rgba(0,0,0,0.4);
    }
    .slogan {
      font-size:1.15rem;
      font-weight:400;
      opacity:0.9;
      text-shadow:0 1px 3px rgba(0,0,0,0.3);
    }

    /* --- CARREGADOR --- */
    .loader {
      display:flex;
      justify-content:center;
      margin-top:25px;
    }
    .dot {
      width:12px;
      height:12px;
      margin:0 5px;
      border-radius:50%;
      background:#00c896;
      animation:bounce 1.5s infinite;
    }
    .dot:nth-child(2){animation-delay:0.2s;}
    .dot:nth-child(3){animation-delay:0.4s;}

    /* --- RODAPÉ --- */
    .footer {
      position:absolute;
      bottom:15px;
      width:100%;
      text-align:center;
      font-size:0.9rem;
      opacity:0.7;
      font-weight:400;
    }

    /* --- EFEITOS / ANIMAÇÕES --- */
    .fade-out { animation:fadeOut 0.5s ease-in-out forwards; }
    @keyframes fadeIn { from{opacity:0;transform:scale(0.9);} to{opacity:1;transform:scale(1);} }
    @keyframes fadeOut { from{opacity:1;} to{opacity:0;visibility:hidden;} }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.08);} }
    @keyframes bounce { 0%,80%,100%{transform:scale(0.8);} 40%{transform:scale(1.2);} }

    /* --- EFEITO DE FUNDO --- */
    .bg-glow {
      position:absolute;
      width:400px;
      height:400px;
      border-radius:50%;
      background:radial-gradient(circle at center,rgba(0,255,204,0.25),transparent 70%);
      animation:floatGlow 6s ease-in-out infinite alternate;
      z-index:1;
      filter:blur(60px);
    }
    @keyframes floatGlow {
      from { transform:translateY(-20px); opacity:0.7; }
      to { transform:translateY(20px); opacity:1; }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="splash-container">
    <div class="logo">
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <path fill="#FFFFFF" d="M52 14H12c-1.1 0-2 .9-2 2v32c0 1.1.9 2 2 2h40c1.1 0 2-.9 2-2V16c0-1.1-.9-2-2-2zm0 34H12V18h40v30z"/>
        <path fill="#FFFFFF" d="M20 22h24v4H20z"/>
        <text x="32" y="45" text-anchor="middle" fill="#FFFFFF" font-size="26" font-family="Nunito, sans-serif" font-weight="700">F</text>
      </svg>
    </div>

    <div class="app-name" data-i18n="app_name">FinanceFlow</div>
    <div class="slogan" data-i18n="slogan">Controle Inteligente das suas Finanças</div>

    <div class="loader">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <div class="footer" data-i18n="footer">Criado por Belardino Capessa</div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const body = document.body;
      const splash = document.querySelector('.splash-container');

      // === Tema ===
      const tema = localStorage.getItem("tema") || "light";
      body.classList.add(tema);

      // === Idioma ===
      const idioma = localStorage.getItem('idioma') || 'pt';
      const textos = {
        pt: {
          app_name: "FinanceFlow",
          slogan: "Controle Inteligente das suas Finanças",
          footer: "Criado por Belardino Capessa"
        },
        en: {
          app_name: "FinanceFlow",
          slogan: "Smart Control of Your Finances",
          footer: "Created by Belardino Capessa"
        },
        fr: {
          app_name: "FinanceFlow",
          slogan: "Contrôle Intelligent de Vos Finances",
          footer: "Créé par Belardino Capessa"
        }
      };

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (textos[idioma][key]) el.textContent = textos[idioma][key];
      });

      // === Redirecionamento ===
      setTimeout(() => {
        splash.classList.add('fade-out');
        setTimeout(() => window.location.href = "home.html", 500);
      }, 3000);
    });
  </script>
</body>
</html>
